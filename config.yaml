# ============================================================
# JobHunt — User Configuration
# ============================================================
# This file contains your profile and preferences.
# Secrets (API keys, OAuth tokens) belong in .env, NOT here.
# ============================================================

user:
  name: "Victor Neisakuolie"
  university: "Hansraj College, University of Delhi"
  major: "B.Sc. Computer Science"
  graduation: "2026"
  skills:
    - "Python"
    - "TypeScript"
    - "FastAPI"
    - "React Native"
    - "Agentic RAG"
    - "LangGraph"
  linkedin: "https://www.linkedin.com/in/victor-loucii-48351a292/"
  portfolio: "https://victor-neisa-portfolio.netlify.app/"  # Optional: your portfolio URL
  project_link: "https://github.com/VictorLoucii/unified-knowledge-agent"

# Resume configuration
resume:
  dir: "/Users/victorloucii/Desktop/AI_CV"  # Directory containing your resume PDF(s)
  # The server will automatically pick the most recently modified .pdf file

# LLM configuration
llm:
  model: "deepseek/deepseek-chat"  # Model ID on OpenRouter
  temperature: 0.7
  max_tokens: 1024

# Target filters (for reference — filtering is manual via LinkedIn search)
targets:
  locations:
    - "Bangalore"
    - "Delhi"
    - "Delhi NCR"
    - "Gurgaon"
    - "Noida"
  # Rule: Target any post with an email, even if "paid" isn't explicitly mentioned.
  # EXCEPTION: Ignore posts mentioning "performance based stipend" (usually unpaid).
  type: "paid or unspecified (no performance-based stipend)"
