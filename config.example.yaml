# ============================================================
# JobHunt — User Configuration
# ============================================================
# This file contains your profile and preferences.
# Secrets (API keys, OAuth tokens) belong in .env, NOT here.
# ============================================================

user:
  name: "Your Name"
  university: "Your University"
  major: "Your Degree/Major"
  graduation: "2026"
  skills:
    - "Python"
    - "TypeScript"
    - "FastAPI"
    - "React Native"
    - "Agentic RAG"
    - "LangGraph"
  constraints:
    allowed_locations: ["Location 1", "Location 2", "Remote"]
    max_experience_required_years: 1
    grad_date: "June 2026"
    degree: "Your Degree"
    excluded_role_types: ["Sales", "Marketing", "Outreach", "Growth", "HR", "Recruitment"]
  linkedin: "https://www.linkedin.com/in/your-profile/"
  portfolio: "https://your-portfolio.com/"  # Optional: your portfolio URL
  project_link: "https://github.com/your-username/project"

# Resume configuration
resume:
  dir: "/Users/your-username/Documents/Resumes"  # Directory containing your resume PDF(s)
  # The server will automatically pick the most recently modified .pdf file

# LLM configuration
llm:
  model: "deepseek/deepseek-chat"  # Model ID on OpenRouter
  fallback_models:
    - "google/gemini-2.5-flash"
  temperature: 0.7
  max_tokens: 1024

# Target filters (for reference — filtering is manual via LinkedIn search)
targets:
  locations:
    - "Location 1"
    - "Location 2"
  # Rule: Target any post with an email, even if "paid" isn't explicitly mentioned.
  # EXCEPTION: Ignore posts mentioning "performance based stipend" (usually unpaid).
  type: "paid or unspecified (no performance-based stipend)"
